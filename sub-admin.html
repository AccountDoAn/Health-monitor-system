<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sub Admin — Health Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sora',sans-serif;background:#f0f7f4;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border-radius:20px;border:1px solid #d0e8da;box-shadow:0 20px 60px rgba(43,95,142,0.10);padding:48px 40px;text-align:center;max-width:420px;width:90%;}
    .icon{font-size:3rem;margin-bottom:16px;}
    h1{font-size:1.3rem;font-weight:800;color:#2b5f8e;margin-bottom:8px;}
    p{font-size:0.82rem;color:#6b8f7a;line-height:1.6;margin-bottom:24px;}
    .chip{display:inline-flex;align-items:center;gap:6px;background:#e8f2fc;color:#2b5f8e;border-radius:20px;padding:5px 14px;font-size:0.75rem;font-weight:700;margin-bottom:24px;}
    .btn{display:inline-flex;align-items:center;gap:7px;background:#2b5f8e;color:#fff;padding:11px 24px;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.15s;}
    .btn:hover{background:#1e4a72;}
    .name{font-weight:700;color:#1a2e1e;}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <div class="chip">🔧 Quản trị viên cơ sở</div>
  <h1>Trang quản trị Sub Admin</h1>
  <p>Xin chào <span class="name" id="uname"></span>!<br>Trang quản trị cơ sở y tế đang được xây dựng và sẽ ra mắt trong thời gian tới.</p>
  <a href="index.html" class="btn" onclick="logout()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Đăng xuất
  </a>
</div>
<script>
  try {
    const s = JSON.parse(localStorage.getItem('hm_session')||'{}');
    if(!s.userId || s.role !== 'sub_admin'){ localStorage.removeItem('hm_session'); window.location.replace('index.html'); }
    document.getElementById('uname').textContent = s.name || 'Sub Admin';
  } catch(_){ window.location.replace('index.html'); }
  function logout(){ localStorage.removeItem('hm_session'); }
</script>
</body>
</html>
